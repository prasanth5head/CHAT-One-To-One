services:
  # ─── Backend: Spring Boot Web Service ───────────────────────────────────────
  - type: web
    name: securechat-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false           # You will fill this in the Render dashboard
      - key: JWT_SECRET
        sync: false           # You will fill this in the Render dashboard
      - key: JWT_EXPIRATION
        value: 86400000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false           # Set to your frontend URL after frontend is deployed
    healthCheckPath: /actuator/health

  # ─── Frontend: React Static Site ─────────────────────────────────────────────
  - type: web
    name: securechat-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false           # Set to your backend URL + /api
      - key: VITE_WS_URL
        sync: false           # Set to your backend URL + /ws
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
