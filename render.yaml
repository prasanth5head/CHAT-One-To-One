services:
  # ─── Backend: Node.js + Express + Socket.IO ──────────────────────────────────
  - type: web
    name: securechat-backend
    runtime: node
    plan: free
    rootDir: ./backend_node
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false           # Set in Render dashboard
      - key: JWT_SECRET
        sync: false           # Set in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false           # Set to your frontend URL
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: REDIS_URL
        sync: false           # Set to your Redis instance URL
    healthCheckPath: /health

  # ─── Frontend: React + Vite Static Site ──────────────────────────────────────
  - type: web
    name: securechat-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false           # Set to your Google OAuth Client ID
      - key: VITE_API_URL
        sync: false           # Set to your backend URL + /api
      - key: VITE_WS_URL
        sync: false           # Set to your backend URL (root, no /ws)
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
