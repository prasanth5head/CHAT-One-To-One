spring.application.name=secure-chat-backend
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/securechat}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:8a4c3f7b2e1d0f5c9e6a3b2d1f0c9a8b7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b}
app.jwt.expirationMs=${JWT_EXPIRATION:86400000}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:demo}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:demo}

# CORS Configuration
app.cors.allowedOrigins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Actuator - expose health endpoint for Render health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
